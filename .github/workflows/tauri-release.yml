name: Tauri Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--target universal-apple-darwin --bundles app,dmg"
          - os: ubuntu-22.04
            args: "--bundles deb,rpm,appimage"
          - os: windows-latest
            args: "--bundles msi,nsis"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Portfolio Tracker ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Initialize Android project
        working-directory: src-tauri
        run: cargo tauri android init

      - name: Decode release keystore (if provided)
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            cat > src-tauri/gen/android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=$RUNNER_TEMP/release.jks
          EOF
            echo "mode=release" >> $GITHUB_OUTPUT
          else
            echo "No release keystore secret set, building debug APK."
            echo "mode=debug" >> $GITHUB_OUTPUT
          fi

      - name: Build Android APK + AAB (release, signed)
        if: steps.keystore.outputs.mode == 'release'
        working-directory: src-tauri
        run: cargo tauri android build --apk --aab

      - name: Build Android APK (debug, unsigned)
        if: steps.keystore.outputs.mode == 'debug'
        working-directory: src-tauri
        run: cargo tauri android build --apk --debug

      - name: Upload Android artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Initialize iOS project
        working-directory: src-tauri
        env:
          CI: "true"
        run: cargo tauri ios init || true

      - name: Disable code signing in Xcode project
        run: |
          PBXPROJ=$(find src-tauri/gen/apple -name "project.pbxproj" | head -n1)
          if [ -n "$PBXPROJ" ]; then
            sed -i '' 's/CODE_SIGN_IDENTITY = ".*";/CODE_SIGN_IDENTITY = "";/g' "$PBXPROJ" || true
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PBXPROJ" || true
            sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$PBXPROJ" || true
          fi

      - name: Build iOS app (unsigned)
        working-directory: src-tauri
        run: |
          cargo tauri ios build --target aarch64 --export-method debugging || \
            cargo tauri ios build --target aarch64 || true

      - name: Repackage .app into unsigned .ipa
        run: |
          set -e
          APP_PATH=$(find src-tauri/gen/apple -type d -name "*.app" | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found; iOS build may have failed."
            exit 1
          fi
          STAGING="$RUNNER_TEMP/ipa-staging"
          rm -rf "$STAGING" && mkdir -p "$STAGING/Payload"
          cp -R "$APP_PATH" "$STAGING/Payload/"
          mkdir -p src-tauri/gen/apple/ipa
          IPA_NAME="portfolio-tracker-${{ github.ref_name }}-unsigned.ipa"
          (cd "$STAGING" && zip -qr "$RUNNER_TEMP/$IPA_NAME" Payload)
          mv "$RUNNER_TEMP/$IPA_NAME" "src-tauri/gen/apple/ipa/$IPA_NAME"
          ls -lh "src-tauri/gen/apple/ipa/"

      - name: Upload iOS .ipa to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            src-tauri/gen/apple/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
